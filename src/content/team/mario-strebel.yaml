bio_de: >
  Mario Strebel ist Partner bei CORE Attorneys und einer der führenden Spezialisten
  für Wettbewerbsrecht und Kartellrecht in der Schweiz. Er berät Unternehmen in
  kartell- und wettbewerbsrechtlichen Verfahren vor WEKO und Gerichten sowie bei
  der Strukturierung wettbewerbsrechtlich komplexer Transaktionen.
bio_en: >
  Mario Strebel is a partner at CORE Attorneys and one of the leading specialists
  in competition law and antitrust in Switzerland. He advises companies in antitrust
  and competition proceedings before COMCO and courts, as well as in structuring
  competitively complex transactions.
