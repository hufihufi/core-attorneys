name: Deploy to FTP (Static Build)

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build (static mode)
        run: npm run build
        env:
          BUILD_TARGET: static

      - name: Verify static build (no Cloudflare artifacts)
        run: |
          if find dist -name "_worker.js" 2>/dev/null | grep -q .; then
            echo "ERROR: Cloudflare worker artifact found in static build – aborting deploy!"
            exit 1
          fi
          echo "✓ Static build verified – no Cloudflare artifacts found"
          echo "Pages built: $(find dist -name '*.html' | wc -l)"
          echo "Build size: $(du -sh dist/ | cut -f1)"

      - name: Deploy via LFTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          sudo apt-get install -y lftp

          # Write lftp script via Python to safely handle special chars in credentials
          python3 - << 'PYEOF'
          import os
          s = os.environ['FTP_SERVER']
          p = os.environ['FTP_PORT']
          u = os.environ['FTP_USERNAME']
          w = os.environ['FTP_PASSWORD']
          d = os.environ['FTP_REMOTE_DIR']
          script = (
            "set ftp:ssl-allow no\n"           # plain FTP – no TLS
            "set ftp:passive-mode yes\n"       # passive mode
            "set ftp:fix-pasv-address yes\n"   # ignore private IP in PASV response (common on shared hosting)
            "set ftp:prefer-epsv no\n"         # use PASV not EPSV
            "set net:timeout 30\n"
            "set net:max-retries 3\n"
            "set net:reconnect-interval-base 5\n"
            f"open ftp://{s}:{p}\n"
            f"user {u} {w}\n"
            f"mirror -R --delete --verbose ./dist/ {d}\n"
            "quit\n"
          )
          with open('/tmp/deploy.lftp', 'w') as f:
            f.write(script)
          PYEOF

          lftp -f /tmp/deploy.lftp
          rm -f /tmp/deploy.lftp
