name: Deploy to FTP (Static Build)

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build (static mode)
        run: npm run build
        env:
          BUILD_TARGET: static

      - name: Verify static build (no Cloudflare artifacts)
        run: |
          if find dist -name "_worker.js" 2>/dev/null | grep -q .; then
            echo "ERROR: Cloudflare worker artifact found in static build – aborting deploy!"
            exit 1
          fi
          echo "✓ Static build verified – no Cloudflare artifacts found"
          echo "Pages built: $(find dist -name '*.html' | wc -l)"
          echo "Build size: $(du -sh dist/ | cut -f1)"

      - name: Diagnose connection (temporary debug step)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          sudo apt-get install -y lftp netcat-openbsd

          echo "====== PORT REACHABILITY ======"
          echo "--- Port 21 (FTP) ---"
          nc -zv -w5 $FTP_SERVER 21 2>&1 || true
          echo "--- Port 22 (SSH/SFTP) ---"
          nc -zv -w5 $FTP_SERVER 22 2>&1 || true
          echo "--- Port 2222 (alt SFTP) ---"
          nc -zv -w5 $FTP_SERVER 2222 2>&1 || true

          echo ""
          echo "====== SFTP TEST (lftp, debug 5) ======"
          python3 - << 'PYEOF'
          import os
          s = os.environ['FTP_SERVER']
          u = os.environ['FTP_USERNAME']
          w = os.environ['FTP_PASSWORD']
          d = os.environ['FTP_REMOTE_DIR']
          script = (
            "debug 5\n"
            "set sftp:auto-confirm yes\n"
            "set net:timeout 10\n"
            "set net:max-retries 1\n"
            f"open sftp://{u}:{w}@{s}:22\n"
            "ls\n"
            "quit\n"
          )
          with open('/tmp/diag_sftp.lftp', 'w') as f:
            f.write(script)
          PYEOF
          lftp -f /tmp/diag_sftp.lftp 2>&1 || true

          echo ""
          echo "====== FTP TEST (lftp, plain, debug 5) ======"
          python3 - << 'PYEOF'
          import os
          s = os.environ['FTP_SERVER']
          u = os.environ['FTP_USERNAME']
          w = os.environ['FTP_PASSWORD']
          d = os.environ['FTP_REMOTE_DIR']
          script = (
            "debug 5\n"
            "set ftp:ssl-allow no\n"
            "set ftp:passive-mode yes\n"
            "set ftp:fix-pasv-address yes\n"
            "set net:timeout 10\n"
            "set net:max-retries 1\n"
            f"open ftp://{u}:{w}@{s}:21\n"
            "ls\n"
            "quit\n"
          )
          with open('/tmp/diag_ftp.lftp', 'w') as f:
            f.write(script)
          PYEOF
          lftp -f /tmp/diag_ftp.lftp 2>&1 || true

          echo ""
          echo "====== REMOTE DIR VALUE ======"
          echo "FTP_REMOTE_DIR = '$FTP_REMOTE_DIR'"
