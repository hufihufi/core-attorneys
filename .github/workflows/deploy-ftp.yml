name: Deploy to FTP (Static Build)

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build (static mode)
        run: npm run build
        env:
          BUILD_TARGET: static

      - name: Verify static build (no Cloudflare artifacts)
        run: |
          if find dist -name "_worker.js" 2>/dev/null | grep -q .; then
            echo "ERROR: Cloudflare worker artifact found in static build – aborting deploy!"
            exit 1
          fi
          echo "✓ Static build verified – no Cloudflare artifacts found"
          echo "Pages built: $(find dist -name '*.html' | wc -l)"
          echo "Build size: $(du -sh dist/ | cut -f1)"

      - name: Deploy via FTPS (Python ftplib)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          # Python ftplib.FTP_TLS gives full debug output (every FTP command + response)
          # and raises clear exceptions at the exact failure point.
          python3 - << 'PYEOF'
          import ftplib, os, pathlib, ssl, sys

          server = os.environ['FTP_SERVER']
          port   = int(os.environ['FTP_PORT'])
          user   = os.environ['FTP_USERNAME']
          passwd = os.environ['FTP_PASSWORD']
          remote = os.environ['FTP_REMOTE_DIR']

          # Unverified SSL context – Hoststar may use a self-signed cert
          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE

          ftp = ftplib.FTP_TLS(context=ctx)
          ftp.set_debuglevel(2)  # print every FTP command + server response

          print(f"==> Connecting to {server}:{port}")
          ftp.connect(server, port, timeout=30)

          print("==> Sending AUTH TLS (explicit FTPS)")
          ftp.auth()

          print(f"==> Logging in as {user}")
          ftp.login(user, passwd)

          print("==> Sending PROT C (plain data channel)")
          ftp.prot_c()
          ftp.set_pasv(True)

          print(f"==> CWD to {remote}")
          ftp.cwd(remote)

          print("==> LIST (data channel test)")
          ftp.retrlines('LIST')

          def upload(ftp, local, rbase):
              for item in sorted(pathlib.Path(local).iterdir()):
                  rpath = rbase.rstrip('/') + '/' + item.name
                  if item.is_dir():
                      try:
                          ftp.mkd(rpath)
                      except ftplib.error_perm:
                          pass  # directory already exists
                      upload(ftp, item, rpath)
                  else:
                      print(f"  PUT {item} -> {rpath}")
                      with open(item, 'rb') as f:
                          ftp.storbinary(f'STOR {rpath}', f)

          print("==> Uploading ./dist/")
          upload(ftp, './dist', remote)
          ftp.quit()
          print("==> Deployment complete")
          PYEOF
